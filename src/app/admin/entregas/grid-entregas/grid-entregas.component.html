<div class="page">

  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1 class="page-title">Entregas</h1>
      <p class="page-sub">Seguimiento de entregas y despacho</p>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="entregas"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [globalFilterFields]="['clienteNombre', 'sucursal', 'repartidorNombre']"
      dataKey="id"
      styleClass="p-datatable-sm"
      #dt>

      <ng-template pTemplate="caption">
        <div class="table-caption">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
              pInputText
              type="text"
              placeholder="Buscar entrega..."
              (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </span>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="clienteNombre">Cliente <p-sortIcon field="clienteNombre"></p-sortIcon></th>
          <th pSortableColumn="sucursal">Sucursal <p-sortIcon field="sucursal"></p-sortIcon></th>
          <th>Repartidor</th>
          <th pSortableColumn="estado">Estado <p-sortIcon field="estado"></p-sortIcon></th>
          <th>Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-entrega>
        <tr>
          <td>{{ entrega.clienteNombre }}</td>
          <td>{{ entrega.sucursal }}</td>
          <td>
            <span *ngIf="entrega.repartidorNombre; else sinRepartidor">
              {{ entrega.repartidorNombre }}
            </span>
            <ng-template #sinRepartidor>
              <span class="text-muted">Sin asignar</span>
            </ng-template>
          </td>
          <td>
            <p-tag
              [value]="getEstadoLabel(entrega.estado)"
              [severity]="getEstadoSeverity(entrega.estado)">
            </p-tag>
          </td>
          <td>
            <div class="actions">
              <button
                pButton icon="pi pi-eye"
                class="p-button-text p-button-sm"
                (click)="verDetalle(entrega.id)"
                pTooltip="Ver detalle">
              </button>
              <button
                pButton icon="pi pi-truck"
                class="p-button-text p-button-sm p-button-info"
                (click)="abrirDialogTransito(entrega)"
                pTooltip="Marcar en tránsito"
                [disabled]="entrega.estado !== 'asignado'">
              </button>
              <button
                pButton icon="pi pi-check"
                class="p-button-text p-button-sm p-button-success"
                (click)="marcarEntregado(entrega)"
                pTooltip="Marcar entregado"
                [disabled]="entrega.estado !== 'en_transito'">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="empty-state">
            <i class="pi pi-truck"></i>
            <span>No hay entregas registradas</span>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

  <!-- Dialog repartidor -->
  <p-dialog
    header="Asignar repartidor"
    [(visible)]="dialogVisible"
    [modal]="true"
    [style]="{ width: '360px' }">

    <div class="dialog-body">
      <label class="dialog-label">Nombre del repartidor *</label>
      <input
        pInputText
        [(ngModel)]="repartidorNombre"
        placeholder="Ej. Juan Pérez"
        class="dialog-input" />
    </div>

    <ng-template pTemplate="footer">
      <button pButton label="Cancelar" class="p-button-text" (click)="dialogVisible = false"></button>
      <button pButton label="Confirmar" icon="pi pi-check" (click)="confirmarTransito()"></button>
    </ng-template>

  </p-dialog>

</div>
