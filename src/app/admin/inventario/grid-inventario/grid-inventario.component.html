<div class="page">

  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <div class="page-header">
    <div>
      <h1 class="page-title">Inventario</h1>
      <p class="page-sub">Stock de productos por sucursal</p>
    </div>
    <button pButton label="Nuevo producto" icon="pi pi-plus" (click)="nuevo()"></button>
  </div>

  <div class="card">
    <p-table
      [value]="inventario"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [globalFilterFields]="['nombreProducto', 'sucursal']"
      dataKey="id"
      styleClass="p-datatable-sm"
      #dt>

      <ng-template pTemplate="caption">
        <div class="table-caption">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
              pInputText
              type="text"
              placeholder="Buscar producto o sucursal..."
              (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
          </span>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="nombreProducto">Producto <p-sortIcon field="nombreProducto"></p-sortIcon></th>
          <th pSortableColumn="sucursal">Sucursal <p-sortIcon field="sucursal"></p-sortIcon></th>
          <th pSortableColumn="stock">Stock <p-sortIcon field="stock"></p-sortIcon></th>
          <th>Stock mínimo</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr>
          <td>{{ item.nombreProducto }}</td>
          <td>{{ item.sucursal }}</td>
          <td>
            <span class="stock-value" [class.stock-cero]="item.stock === 0">
              {{ item.stock }}
            </span>
          </td>
          <td>{{ item.stockMinimo }}</td>
          <td>
            <p-tag
              [value]="getStockLabel(item)"
              [severity]="getStockSeverity(item)">
            </p-tag>
          </td>
          <td>
            <div class="actions">
              <button pButton icon="pi pi-eye" class="p-button-text p-button-sm" (click)="verDetalle(item.id!)" pTooltip="Ver detalle"></button>
              <button pButton icon="pi pi-pencil" class="p-button-text p-button-sm" (click)="editar(item.id!)" pTooltip="Editar stock"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-state">
            <i class="pi pi-box"></i>
            <span>No hay productos en inventario</span>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
